name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: docker image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  extension:
    name: browser extension zips
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tide/extension build
      - run: pnpm --filter @tide/extension build:firefox
      - name: zip
        run: |
          cd packages/extension
          (cd dist/chrome && zip -r ../../tide-chrome-${GITHUB_REF_NAME}.zip .)
          (cd dist/firefox && zip -r ../../tide-firefox-${GITHUB_REF_NAME}.zip .)
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/extension/tide-chrome-*.zip
            packages/extension/tide-firefox-*.zip
          draft: false
          prerelease: false
