services:
  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    labels:
      - traefik.enable=false

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: tide
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tide
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tide"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1000", "--appendonly", "yes"]
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/tide-archive || true;
      mc anonymous set download local/tide-archive || true;
      exit 0;
      "

  app:
    image: ghcr.io/mateokadiu/tide:${TIDE_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: https://${TIDE_HOST}
      DATABASE_DRIVER: postgres
      DATABASE_URL: postgres://tide:${POSTGRES_PASSWORD}@postgres:5432/tide
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-tide <hello@tide.example>}
      EMAIL_INBOUND_DOMAIN: ${EMAIL_INBOUND_DOMAIN:-tide.example}
      RESEND_INBOUND_WEBHOOK_SECRET: ${RESEND_INBOUND_WEBHOOK_SECRET:-}
      STORAGE_DRIVER: minio
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_REGION: auto
      STORAGE_S3_BUCKET: tide-archive
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      FLAG_BIONIC_READING: ${FLAG_BIONIC_READING:-}
      FLAG_LISTEN_MODE: ${FLAG_LISTEN_MODE:-1}
      FLAG_PUBLIC_SHARING: ${FLAG_PUBLIC_SHARING:-1}
      FLAG_WEEKLY_DIGEST: ${FLAG_WEEKLY_DIGEST:-}
    labels:
      - traefik.enable=true
      - traefik.http.routers.tide.rule=Host(`${TIDE_HOST}`)
      - traefik.http.routers.tide.entrypoints=websecure
      - traefik.http.routers.tide.tls.certresolver=le
      - traefik.http.services.tide.loadbalancer.server.port=3000

  worker:
    image: ghcr.io/mateokadiu/tide:${TIDE_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "node_modules/.bin/tsx", "apps/web/lib/jobs/worker.ts"]
    environment:
      NODE_ENV: production
      DATABASE_DRIVER: postgres
      DATABASE_URL: postgres://tide:${POSTGRES_PASSWORD}@postgres:5432/tide
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      STORAGE_DRIVER: minio
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_BUCKET: tide-archive
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    labels:
      - traefik.enable=false

volumes:
  postgres:
  redis:
  minio:
  letsencrypt:
